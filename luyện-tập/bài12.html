<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tính lãi ngân hàng</title>
</head>
<body>
    <h1>Tính lãi ngân hàng</h1>
    <label>Số tiền ban đầu:</label>
    <input type="number" id="money"><br><br>
    <label>Số tháng gửi:</label>
    <input type="number" id="month"><br><br>
    <label>Lãi suất hàng tháng (%):</label>
    <input type="number" id="rate"><br><br>
    <button onclick="tinhLai()">Tính</button>
    <p id="result"></p>
    <script>
        function tinhLai() {
            let money = Number(document.getElementById("money").value);
            let month = Number(document.getElementById("month").value);
            let rate = Number(document.getElementById("rate").value);
            let total = money;
            for (let i = 1; i <= month; i++) {
                total = total + (total * rate / 100);
            }
            document.getElementById("result").innerText =
                "Số tiền sau " + month + " tháng là: " +
                total.toFixed(0) + " VNĐ";
        }
    </script>
</body>
</html>
