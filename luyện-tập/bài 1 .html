<!DOCTYPE html>
<html lang ="vi">
    <head> 
        <meta charset="UTF-8">
        <title>Đổi độ C sang độ F </title>
    </head>
    <body> 
        <h1>Chuyển đổi nhiệt độ </h1>
        <label>Nhập độ C </label>
        <input type="number "id = "celsius">
        <button onclick="convertTempertature()">Chuyển đổi</button>
        <h2 id ="result"></h2>
        <script>
            function convertTempertature(){
                let celsius = 
                Number(document.getElementById("celsius").value);
                let fahrenheit =
                (celsius*9/5)+32;
                document.getElementById("result").innerText=
               celsius +"°C = " +
                fahrenheit.toFixed(2)+"°F";
            }
        </script>
    </body>
</html>
