<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Diện Tích Hình Vuông</title>
</head>

<body>

    <h1>Tính Diện Tích Hình Vuông</h1>

    <label>
        Nhập cạnh a:
    </label>

    <input type="number" id="canh">

    <button onclick="tinhDienTich()">Tính diện tích  </button>
    <h2 id="result"></h2>
    <script>
        function tinhDienTich() {
            let a =
                Number(document.getElementById("canh").value);

            let dienTich =
                a * a;

            document.getElementById("result").innerText =
                "Diện tích = " + dienTich;
        }

    </script>

</body>

</html>
