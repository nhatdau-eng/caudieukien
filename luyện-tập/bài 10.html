<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tính giá điện</title>
</head>
<body>

    <h1>Tính tiền điện</h1>

    <label>Nhập số kWh:</label>
    <input type="number" id="kwh">

    <button onclick="tinhTienDien()">Tính tiền</button>

    <h2 id="result"></h2>

    <script>
        function tinhTienDien() {

            let kwh = Number(document.getElementById("kwh").value);

            let money;

            if (kwh <= 50) {
                money = kwh * 1500;
            } else {
                money = (50 * 1500) + ((kwh - 50) * 2000);
            }

            document.getElementById("result").innerText =
                "Tiền điện = " + money + " VNĐ";
        }
    </script>

</body>
</html>
